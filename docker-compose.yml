version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: adtech-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: adtech
      MYSQL_USER: adtech
      MYSQL_PASSWORD: adtech
    ports:
      - "3306:3306"
    command:
      [
        "--local-infile=1",
        "--secure-file-priv=",
        "--default-authentication-plugin=mysql_native_password"
      ]
    volumes:
      - mysql_data:/var/lib/mysql
      - ./normalized_data:/load_data
      - ./sql:/workspace/sql

volumes:
  mysql_data:
